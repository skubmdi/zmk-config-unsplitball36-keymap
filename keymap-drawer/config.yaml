    INT3: '\'
    LEFT: '←'
    DOWN: '↓'
    UP: '↑'
    RIGHT: '→'
    HOME: '↖'
    PG_DN: '⤒'
    PG_UP: '⤓'
    END: '↘'
    PSCRN: '⎙'
    SLCK: '⇳'
    PAUSE_BREAK: '⎉'
