    "&base_layer": "BASE",
    "&bootloader": "BOOT",
    "&home": "asdf;lkj",
    "&mkp MB1": "Mouse Button1",
    "&mkp MB2": "Mouse Button2",
    "&mkp MB3": "Mouse Button3",
    "&mkp MB4": "Mouse Button4",
    "&mkp MB5": "Mouse Button5",
    "&mkp_2mb1": "Double Click",
    "&mkp_3mb1": "Triple Click",
    "&bt BT_SEL 0": "BT0 SELECT",
    "&bt BT_SEL 1": "BT1 SELECT",
    "&bt BT_SEL 2": "BT2 SELECT",
    "&bt BT_SEL 3": "BT3 SELECT",
    "&bt BT_SEL 4": "BT4 SELECT",
